<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>따라쓰기 학습지 생성기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 인쇄 제한 안내 모달 -->
  <div id="printModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 2.5rem; border-radius: 12px; max-width: 400px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
      <h3 style="margin-bottom: 1rem; color: #d32f2f;">인쇄 기능 안내</h3>
      <p style="margin-bottom: 1.5rem; color: #555; font-size: 0.95rem; line-height: 1.6; word-break: keep-all;">
        현재 작업 중인 미리보기 패널에서는 보안상 브라우저 인쇄 창을 띄울 수 없습니다.<br><br>
        실제 서버(GitHub Pages 등)에 코드를 올리시거나, 코드를 복사해 <b>.html</b> 파일로 저장 후 브라우저에서 직접 실행하시면 <b>정상적으로 인쇄가 가능</b>합니다!
      </p>
      <button id="closeModalBtn" style="background: #4a90d9; color: white; padding: 0.6rem 2rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">확인</button>
    </div>
  </div>

  <div class="app-layout">
    <div class="controls no-print">
      <h1>따라쓰기 학습지 생성기</h1>

      <div class="input-group">
        <label for="textInput">연습할 문장 입력</label>
        <textarea id="textInput" rows="4" placeholder="여기에 연습할 문장을 입력하세요..."></textarea>
      </div>

      <div class="options-row">
        <div class="input-group">
          <label for="colCount">한 줄 칸 수</label>
          <select id="colCount">
            <option value="8">8칸</option>
            <option value="10" selected>10칸</option>
            <option value="15">15칸</option>
            <option value="20">20칸</option>
          </select>
        </div>

        <div class="input-group">
          <label for="guideRows">가이드 줄 수</label>
          <input type="number" id="guideRows" value="1" min="0" max="10">
        </div>

        <div class="input-group">
          <label for="blankRows">빈칸 줄 수</label>
          <input type="number" id="blankRows" value="1" min="0" max="10">
        </div>

        <div class="input-group">
          <label for="textColor">글자색</label>
          <input type="color" id="textColor" value="#000000">
        </div>
      </div>

      <div class="options-row" style="margin-top:1rem;">
        <label class="checkbox-label">
          <input type="checkbox" id="optParagraphIndent" checked>
          문단 및 줄바꿈 시 첫 칸 비우기 (들여쓰기)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="optDialogueBreak" checked>
          대화문 줄바꿈
        </label>
      </div>

      <div class="input-group" style="margin-top:1rem;">
        <label>글꼴 선택</label>
        <div class="font-group" id="fontGroup">
          <button type="button" class="font-btn active" data-font="'Noto Serif KR', serif" style="font-family:'Noto Serif KR',serif">노토 세리프</button>
          <button type="button" class="font-btn" data-font="'Nanum Myeongjo', serif" style="font-family:'Nanum Myeongjo',serif">나눔명조</button>
          <button type="button" class="font-btn" data-font="'Gowun Batang', serif" style="font-family:'Gowun Batang',serif">고운바탕</button>
          <button type="button" class="font-btn" data-font="'궁서', 'Gungsuh', serif" style="font-family:'궁서', 'Gungsuh', serif">궁서</button>
          <button type="button" class="font-btn" data-font="'Gowun Dodum', sans-serif" style="font-family:'Gowun Dodum',sans-serif">고운돋움</button>
          <button type="button" class="font-btn" data-font="'Song Myung', serif" style="font-family:'Song Myung',serif">송명</button>
          <button type="button" class="font-btn" data-font="'Yeon Sung', cursive" style="font-family:'Yeon Sung',cursive">연성</button>
          <button type="button" class="font-btn" data-font="'Nanum Pen Script', cursive" style="font-family:'Nanum Pen Script',cursive">나눔손글씨</button>
          <button type="button" class="font-btn" data-font="'Jua', sans-serif" style="font-family:'Jua',sans-serif">주아</button>
          <button type="button" class="font-btn" data-font="'Gamja Flower', cursive" style="font-family:'Gamja Flower',cursive">감자꽃</button>
        </div>
      </div>

      <div class="options-row">
        <div class="input-group">
          <label for="titleInput">학습지 제목 (선택)</label>
          <input type="text" id="titleInput" placeholder="예: 받아쓰기 연습">
        </div>
      </div>

      <div class="button-row">
        <button id="printBtn" type="button">인쇄하기</button>
      </div>
    </div>

    <div id="output"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
